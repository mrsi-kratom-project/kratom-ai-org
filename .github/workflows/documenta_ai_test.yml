name: Verify GCP Access and Run Document AI

on:
  push:
    branches: [ main ]

# CRITICAL: This grants GitHub Actions permission to request the OIDC token
permissions:
  contents: read
  id-token: write

jobs:
  auth-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 1: Exchange GitHub OIDC token for a short-lived GCP token
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: 'projects/970498681695/locations/global/workloadIdentityPools/kratom-ai-serv-identity/providers/kratom-serv-access1'
        service_account: 'kratom-service-acc1@kratom-ai-ocr.iam.gserviceaccount.com'

    # Step 2: Set up Cloud SDK to make calling APIs easier
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

# 3. RUN THE TEST
    - name: Describe Document AI Processor
      run: |
        echo "Successfully assumed identity of the service account!"
        
        # Replace these with your actual Processor ID and Location (e.g., us or eu)
        PROCESSOR_ID="1f3c203d4ff7ddc1"
        LOCATION="us" 
        
        # This command queries the Document AI API to get information about your processor
        gcloud document-ai processors describe $PROCESSOR_ID --location=$LOCATION