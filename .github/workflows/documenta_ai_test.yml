name: Verify GCP Access and Run Document AI

on:
  push:
    branches: [ main ]

# CRITICAL: This grants GitHub Actions permission to request the OIDC token
permissions:
  contents: read
  id-token: write

jobs:
  auth-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    # Step 1: Exchange GitHub OIDC token for a short-lived GCP token
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: 'projects/970498681695/locations/global/workloadIdentityPools/kratom-ai-serv-identity/providers/kratom-serv-access1'
        service_account: 'kratom-service-acc1@kratom-ai-ocr.iam.gserviceaccount.com'
        token_format: 'access_token'

    # Step 2: Set up Cloud SDK to make calling APIs easier
    - name: Query Specific Document AI Processor
      run: |
        echo "Successfully assumed identity of the service account!"
        echo "Querying your active OCR Processor: kratom-doc-ocr1"
        
        # We can now natively pull the token from the previous step's output variable!
        curl -X GET \
          -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
          -H "Content-Type: application/json" \
          "https://us-documentai.googleapis.com/v1/projects/970498681695/locations/us/processors/1f3c203d4ff7ddc1"